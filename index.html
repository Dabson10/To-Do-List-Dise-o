    <!-- Login de la app. -->

        <div class="cont-form">
            <div class="info">
                <h3>To-Do List</h3>
            </div>

    </section>

            <!-- Contenedor con las diferentes opciones. -->
            <div class="contSecciones cerrar" id="opciones">

                <p class="etiquetaF" data-opcion="crearTarea">Crear tarea</p>

                    </svg>
                    <span>
                        <b>Datos del usuario: </b>
                    </span>
                    <label for="nombreEdit">Nombre:</label>
                    <input type="text" id="nombreEdit" name="nombre" disabled>

                    <label for="apeEdit">Apellido</label>
                    <input type="text" id="apeEdit" name="apellido" disabled>

                    <label for="idUsuEdit">Id usuario: </label>
                    <input type="text" name="idUsuEdit" id="idUsuEdit" disabled>
                    <button type="button" class="btnDatos" id="btnDatosUsu">Cambiar datos</button>
                </form>
            </div>
        </section>
        <!-- Un mismo contenedor para crear y ver las tareas. -->

                                    <option value="Media">Media.</option>
                                    <option value="Alta">Alta.</option>
                                </select>
                            </div>
                            <div class="contInCreOrd">
                                <label for="">Fecha limite.</label>
                                <input type="date" name="fecha_limite" id="fechaLimieCreate">
                                <label for="">Id usuario:</label>
                                <input type="text" name="id_usuario" value='60' id="tareaIdUsu" readonly>

                            </div>
                        </div>
                        <button class="crearTarea">Crear Tarea.</button>

                    </form>
                </div>
            </section>
